name: CT-17EV
year: 2026
description: "2026 competition car - 100S4P P50B, 20 lbs lighter"

vehicle:
  mass_kg: 279.0  # 220 kg car - 9 kg (20 lbs lighter) + 68 kg driver
  frontal_area_m2: 1.0  # Same aero package as CT-16EV (DSS ref area)
  drag_coefficient: 1.502  # CdA=1.502 from DSS (431N drag at 80 kph)
  rolling_resistance: 0.015
  wheelbase_m: 1.549
  rotor_inertia_kg_m2: 0.06   # EMRAX 228 datasheet (same motor)
  wheel_inertia_kg_m2: 0.3    # per wheel estimate

powertrain:
  motor_speed_max_rpm: 2900
  brake_speed_rpm: 2400
  torque_limit_inverter_nm: 85.0
  torque_limit_lvcu_nm: 150.0
  iq_limit_a: 170.0
  id_limit_a: 30.0
  gear_ratio: 3.6363  # 40/11 teeth
  drivetrain_efficiency: 0.92
  # NF-31: LVCU power constant scaled for CT-17EV 100S pack.
  # Firmware default (420.0) was calibrated for 110S (~410V nominal).
  # With 100S pack (~370V nominal), torque-per-amp at the same ω scales
  # with pack voltage → scale by 370/410 ≈ 0.9024.
  lvcu_power_constant: 379.02   # 420.0 * (370/410)
  lvcu_rpm_scale: 0.1076
  lvcu_omega_floor: 23.04
  lvcu_pedal_deadzone_low: 0.1
  lvcu_pedal_deadzone_high: 0.9
  lvcu_overspeed_rpm: 6000.0
  lvcu_overspeed_torque_nm: 30.0

battery:
  cell_type: "P50B"
  cell_capacity_ah: 5.0  # Molicel P50B datasheet (5000 mAh nominal)
  # Structural thermal mass scales roughly with cell count:
  # CT-16EV 110S4P had 7.5 kJ/K (440 cells) → 100S4P (400 cells) ~6.8 kJ/K.
  pack_structural_thermal_mass_kj_per_k: 6.8
  topology:
    series: 100
    parallel: 4
  cell_voltage_min_v: 2.50
  cell_voltage_max_v: 4.20
  discharged_soc_pct: 2.0
  soc_taper:
    threshold_pct: 85.0
    rate_a_per_pct: 1.0
  discharge_limits:
    - temp_c: 30.0
      max_current_a: 100.0
    - temp_c: 35.0
      max_current_a: 85.0
    - temp_c: 40.0
      max_current_a: 65.0
    - temp_c: 45.0
      max_current_a: 55.0
    - temp_c: 50.0
      max_current_a: 45.0
    - temp_c: 55.0
      max_current_a: 40.0
    - temp_c: 60.0
      max_current_a: 35.0
    - temp_c: 65.0
      max_current_a: 0.0
