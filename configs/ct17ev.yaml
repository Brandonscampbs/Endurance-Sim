name: CT-17EV
year: 2026
description: "2026 competition car - 100S4P P50B, 20 lbs lighter"

vehicle:
  mass_kg: 279.0  # 220 kg car - 9 kg (20 lbs lighter) + 68 kg driver
  frontal_area_m2: 1.0  # Same aero package as CT-16EV (DSS ref area)
  drag_coefficient: 1.502  # CdA=1.502 from DSS (431N drag at 80 kph)
  rolling_resistance: 0.015
  wheelbase_m: 1.549
  downforce_coefficient: 2.18  # DSS: ClA=2.18 m² (625N at 80 kph) — same aero as CT-16EV
  rotor_inertia_kg_m2: 0.06   # EMRAX 228 datasheet (same motor)
  wheel_inertia_kg_m2: 0.3    # per wheel estimate

powertrain:
  motor_speed_max_rpm: 2900
  brake_speed_rpm: 2400
  torque_limit_inverter_nm: 85.0
  torque_limit_lvcu_nm: 150.0
  iq_limit_a: 170.0
  id_limit_a: 30.0
  gear_ratio: 3.6363  # 40/11 teeth
  drivetrain_efficiency: 0.92
  lvcu_power_constant: 420.0
  lvcu_rpm_scale: 0.1076
  lvcu_omega_floor: 23.04
  lvcu_pedal_deadzone_low: 0.1
  lvcu_pedal_deadzone_high: 0.9
  lvcu_overspeed_rpm: 6000.0
  lvcu_overspeed_torque_nm: 30.0

battery:
  cell_type: "P50B"
  topology:
    series: 100
    parallel: 4
  cell_voltage_min_v: 2.50
  cell_voltage_max_v: 4.20
  discharged_soc_pct: 2.0
  soc_taper:
    threshold_pct: 85.0
    rate_a_per_pct: 1.0
  discharge_limits:
    - temp_c: 30.0
      max_current_a: 100.0
    - temp_c: 35.0
      max_current_a: 85.0
    - temp_c: 40.0
      max_current_a: 65.0
    - temp_c: 45.0
      max_current_a: 55.0
    - temp_c: 50.0
      max_current_a: 45.0
    - temp_c: 55.0
      max_current_a: 40.0
    - temp_c: 60.0
      max_current_a: 35.0
    - temp_c: 65.0
      max_current_a: 0.0

tire:
  tir_file: "Real-Car-Data-And-Stats/Tire Models from TTC/Round_8_Hoosier_LC0_16x7p5_10_on_8in_10psi_PAC02_UM2.tir"
  static_camber_front_deg: -1.25
  static_camber_rear_deg: -1.25
  grip_scale: 0.4697  # TTC-to-car calibration from Michigan 2025 endurance telemetry

suspension:
  roll_stiffness_front_nm_per_deg: 238.0
  roll_stiffness_rear_nm_per_deg: 258.0
  roll_center_height_front_mm: 88.9
  roll_center_height_rear_mm: 63.5
  roll_camber_front_deg_per_deg: -0.5
  roll_camber_rear_deg_per_deg: -0.554
  front_track_mm: 1194.0
  rear_track_mm: 1168.0
